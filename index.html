    <script>
      // Load third-party scripts only after interaction or fallback timeout.
      (function () {
        var loaded = false;

        function loadScript(src, done) {
          var s = document.createElement('script');
          s.src = src;
          s.async = true;
          s.onload = done || null;
          s.onerror = function () {};
          document.head.appendChild(s);
        }

        function loadThirdParties() {
          if (loaded) return;
          loaded = true;

          // GTM bootstrap
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          loadScript('https://www.googletagmanager.com/gtm.js?id=GTM-KGN8CMBL');

          // GA (deferred)
          loadScript('https://www.googletagmanager.com/gtag/js?id=G-6XTDE9Y48B', function () {
            window.dataLayer = window.dataLayer || [];
            function gtag() { window.dataLayer.push(arguments); }
            window.gtag = gtag;
            gtag('js', new Date());
            gtag('config', 'G-6XTDE9Y48B', {
              anonymize_ip: true,
              cookie_flags: 'SameSite=None;Secure',
              debug_mode: false
            });
          });
        }

        function initLazyThirdPartyLoad() {
          loadThirdParties();
          window.removeEventListener('pointerdown', initLazyThirdPartyLoad);
          window.removeEventListener('keydown', initLazyThirdPartyLoad);
          window.removeEventListener('touchstart', initLazyThirdPartyLoad);
          window.removeEventListener('scroll', initLazyThirdPartyLoad);
        }

        window.addEventListener('pointerdown', initLazyThirdPartyLoad, { once: true, passive: true });
        window.addEventListener('keydown', initLazyThirdPartyLoad, { once: true });
        window.addEventListener('touchstart', initLazyThirdPartyLoad, { once: true, passive: true });
        window.addEventListener('scroll', initLazyThirdPartyLoad, { once: true, passive: true });

        // Fallback for no interaction
        window.addEventListener('load', function () {
          setTimeout(loadThirdParties, 6500);
        }, { once: true });
      })();

      // Keyboard navigation enhancement
      document.addEventListener('keydown', function(e) {
        // ESC key handler for modals and popups
        if (e.key === 'Escape') {
          // Close any open modal/popup
          const modals = document.querySelectorAll('[role="dialog"]');
          modals.forEach(modal => {
            if (modal.getAttribute('aria-hidden') === 'false') {
              modal.setAttribute('aria-hidden', 'true');
            }
          });
        }

        // Tab trap for modals
        if (e.key === 'Tab') {
          const modals = document.querySelectorAll('[role="dialog"][aria-hidden="false"]');
          if (modals.length > 0) {
            const modal = modals[0];
            const focusableElements = modal.querySelectorAll(
              'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
            );
            const firstFocusable = focusableElements[0];
            const lastFocusable = focusableElements[focusableElements.length - 1];

            if (e.shiftKey && document.activeElement === firstFocusable) {
              e.preventDefault();
              lastFocusable.focus();
            } else if (!e.shiftKey && document.activeElement === lastFocusable) {
              e.preventDefault();
              firstFocusable.focus();
            }
          }
        }
      });

      // Focus visible utility
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          document.body.classList.add('user-is-tabbing');
        }
      });

      document.addEventListener('mousedown', function() {
        document.body.classList.remove('user-is-tabbing');
      });
    </script>
